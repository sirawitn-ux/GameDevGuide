<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab01 — Godot Game</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1a2e;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    color: #e0e0e0;
  }
  .godot-header {
    font-size: 11px; color: #666; letter-spacing: .1em;
    text-transform: uppercase; margin-bottom: 1rem;
  }
  .canvas-wrap {
    position: relative;
    background: #000;
    border: 2px solid #2a2a4a;
    border-radius: 4px;
    overflow: hidden;
    width: 640px; height: 360px;
    display: flex; align-items: center; justify-content: center;
  }
  canvas {
    width: 640px; height: 360px;
    display: block;
  }
  .overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #0d0d1a;
    gap: 1rem;
  }
  .game-title { font-size: 28px; font-weight: 700; color: #fff; }
  .game-sub   { font-size: 14px; color: #888; }
  .play-btn {
    margin-top: .5rem;
    padding: 10px 32px; border-radius: 6px;
    background: #478cbf; color: #fff;
    border: none; font-size: 16px; font-weight: 600;
    cursor: pointer; transition: background .15s;
  }
  .play-btn:hover { background: #5a9fd4; }
  .mock-badge {
    position: absolute; top: 10px; right: 10px;
    background: #ff6b35; color: #fff;
    font-size: 10px; font-weight: 700;
    padding: 3px 8px; border-radius: 4px;
    letter-spacing: .05em;
  }
  .progress-wrap {
    width: 640px; background: #111;
    border: 1px solid #2a2a4a; border-top: none;
    border-radius: 0 0 4px 4px;
    padding: .5rem .75rem;
    display: flex; align-items: center; gap: .75rem;
  }
  .progress-bar {
    flex: 1; height: 6px;
    background: #222; border-radius: 3px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; width: 0;
    background: #478cbf; border-radius: 3px;
    transition: width .05s;
  }
  .progress-label { font-size: 11px; color: #666; white-space: nowrap; }
  .back-link {
    margin-top: 1rem;
    font-size: 13px; color: #555; text-decoration: none;
    transition: color .15s;
  }
  .back-link:hover { color: #aaa; }

  /* fake game running */
  .game-scene {
    display: none;
    width: 100%; height: 100%;
    background: linear-gradient(180deg, #1a3a5c 0%, #0d1f33 60%, #2d5a1b 60%, #1a3a0d 100%);
    position: relative; overflow: hidden;
  }
  .game-scene .player {
    position: absolute; bottom: 42%; left: 80px;
    width: 32px; height: 32px;
    background: #ff6b35; border-radius: 4px;
    animation: bob 0.5s ease-in-out infinite alternate;
  }
  .game-scene .platform {
    position: absolute; bottom: 38%;
    height: 12px; border-radius: 3px; background: #5a3a1a;
  }
  .game-scene .score {
    position: absolute; top: 12px; left: 12px;
    font-size: 14px; font-weight: 600; color: #fff;
    text-shadow: 0 1px 3px #000;
  }
  @keyframes bob { from { transform: translateY(0); } to { transform: translateY(-4px); } }
</style>
</head>
<body>

<div class="godot-header">Godot Engine — HTML5 Export</div>

<div class="canvas-wrap" id="canvas-wrap">
  <div class="overlay" id="overlay">
    <div class="game-title">Lab 01</div>
    <div class="game-sub">ตัวอย่างเกม Godot Export</div>
    <button class="play-btn" onclick="startGame()">▶ Play</button>
    <div class="mock-badge">MOCK EXPORT</div>
  </div>

  <div class="game-scene" id="game-scene">
    <div class="score" id="score">Score: 0</div>
    <div class="player"></div>
    <div class="platform" style="left:0; width:200px"></div>
    <div class="platform" style="left:220px; width:150px; bottom:44%"></div>
    <div class="platform" style="left:400px; width:180px; bottom:42%"></div>
    <div class="platform" style="left:0; width:640px; bottom:38%"></div>
    <div class="mock-badge">MOCK EXPORT</div>
  </div>
</div>

<div class="progress-wrap" id="progress-wrap" style="display:none">
  <div class="progress-bar"><div class="progress-fill" id="pfill"></div></div>
  <div class="progress-label" id="plabel">Loading... 0%</div>
</div>

<a class="back-link" href="../">← กลับ Homepage</a>

<script>
function startGame(){
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'flex';
  var fill = document.getElementById('pfill');
  var label = document.getElementById('plabel');
  var pct = 0;
  var loadFiles = ['lab01.js','lab01.wasm','lab01.pck'];
  var fi = 0;
  var iv = setInterval(function(){
    pct += Math.random() * 8 + 2;
    if(pct >= 100){ pct = 100; clearInterval(iv);
      label.textContent = 'Done!';
      setTimeout(showGame, 300);
    } else {
      var idx = Math.floor((pct/100)*loadFiles.length);
      label.textContent = 'Loading ' + (loadFiles[idx]||loadFiles[loadFiles.length-1]) + '... ' + Math.floor(pct) + '%';
    }
    fill.style.width = pct + '%';
  }, 80);
}
function showGame(){
  document.getElementById('progress-wrap').style.display = 'none';
  document.getElementById('game-scene').style.display = 'block';
  var score = 0;
  setInterval(function(){ score += 10; document.getElementById('score').textContent = 'Score: ' + score; }, 1000);
}
</script>
</body>
</html>
